<div class="nu-overlay-demo" data-nu-bottom-sheet>
  <button class="nu-btn nu-btn-solid" type="button" data-nu-open>Open Bottom Sheet</button>
  <div class="nu-overlay-backdrop" data-nu-overlay></div>
  <section class="nu-bottom-sheet" data-nu-panel role="dialog" aria-label="Bottom sheet" aria-modal="true">
    <header class="nu-drawer-head">
      <h3 class="nu-card-title">Quick Actions</h3>
      <button class="nu-btn nu-btn-sm" type="button" data-nu-close>Close</button>
    </header>
    <div class="nu-row">
      <button class="nu-btn nu-btn-sm" type="button">Create class</button>
      <button class="nu-btn nu-btn-sm" type="button">Bulk import</button>
      <button class="nu-btn nu-btn-sm" type="button">Export CSV</button>
    </div>
  </section>
</div>
