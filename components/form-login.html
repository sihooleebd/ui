<form class="nu-form" aria-label="Login form">
  <div class="nu-field">
    <label class="nu-label" for="login-email">Email</label>
    <input class="nu-input" id="login-email" type="email" placeholder="admin@school.edu">
  </div>
  <div class="nu-field">
    <label class="nu-label" for="login-password">Password</label>
    <input class="nu-input" id="login-password" type="password" placeholder="Enter password">
  </div>
  <label class="nu-check">
    <input class="nu-check-input" type="checkbox" checked>
    <span class="nu-check-box"></span>
    <span class="nu-check-label">Remember this device</span>
  </label>
  <div class="nu-form-actions">
    <button class="nu-btn" type="button">Cancel</button>
    <button class="nu-btn nu-btn-solid" type="submit">Sign in</button>
  </div>
</form>
