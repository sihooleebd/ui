<form class="nu-step-form" data-nu-step-form data-nu-step-form-component>
  <section data-nu-step>
    <h3 class="nu-card-title">Step 1 / Account</h3>
    <div class="nu-field"><label class="nu-label" for="step-name">Name</label><input class="nu-input" id="step-name" type="text" value="Benjamin"></div>
    <div class="nu-form-actions"><button class="nu-btn nu-btn-sm nu-btn-solid" type="button" data-nu-next>Next</button></div>
  </section>
  <section class="nu-hidden" data-nu-step>
    <h3 class="nu-card-title">Step 2 / Preferences</h3>
    <label class="nu-check"><input class="nu-check-input" type="checkbox" checked><span class="nu-check-box"></span><span class="nu-check-label">Email alerts</span></label>
    <div class="nu-form-actions">
      <button class="nu-btn nu-btn-sm" type="button" data-nu-prev>Back</button>
      <button class="nu-btn nu-btn-sm nu-btn-solid" type="button" data-nu-next>Next</button>
    </div>
  </section>
  <section class="nu-hidden" data-nu-step>
    <h3 class="nu-card-title">Step 3 / Confirm</h3>
    <p class="nu-card-content">Everything looks good. Submit when ready.</p>
    <div class="nu-form-actions">
      <button class="nu-btn nu-btn-sm" type="button" data-nu-prev>Back</button>
      <button class="nu-btn nu-btn-sm nu-btn-solid" type="button">Submit</button>
    </div>
  </section>
</form>
