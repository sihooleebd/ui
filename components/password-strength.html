<section class="nu-password-strength" data-nu-password-strength data-nu-password-strength-component>
  <header class="nu-surface-head">
    <h3 class="nu-card-title">Password Strength</h3>
    <span class="nu-help" data-nu-label>Weak</span>
  </header>
  <input class="nu-input" type="password" data-nu-input placeholder="Enter password" aria-label="Password input">
  <div class="nu-strength-track" aria-hidden="true">
    <div class="nu-strength-bar" data-nu-bar></div>
  </div>
</section>
