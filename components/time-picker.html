<section class="nu-time-picker" data-nu-time-picker data-hour="9" data-minute="0">
  <header class="nu-surface-head">
    <h3 class="nu-card-title">Time Picker</h3>
    <span class="nu-help">Current</span>
  </header>
  <div class="nu-time-output" data-nu-output aria-live="polite">09:00</div>
  <div class="nu-time-controls" role="group" aria-label="Time controls">
    <button class="nu-btn nu-btn-sm" type="button" data-nu-hour-dec>- Hour</button>
    <button class="nu-btn nu-btn-sm" type="button" data-nu-hour-inc>+ Hour</button>
    <button class="nu-btn nu-btn-sm" type="button" data-nu-minute-dec>- 5m</button>
    <button class="nu-btn nu-btn-sm" type="button" data-nu-minute-inc>+ 5m</button>
  </div>
</section>
