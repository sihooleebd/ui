<section class="nu-multi-select" data-nu-multi-select data-nu-multi-select-component>
  <header class="nu-surface-head">
    <h3 class="nu-card-title">Multi Select</h3>
    <span class="nu-help" data-nu-value>Select options</span>
  </header>
  <div class="nu-multi-options" role="listbox" aria-label="Category selection" aria-multiselectable="true">
    <button class="nu-chip" type="button" data-nu-option="Math">Math</button>
    <button class="nu-chip" type="button" data-nu-option="Science">Science</button>
    <button class="nu-chip" type="button" data-nu-option="Arts">Arts</button>
    <button class="nu-chip" type="button" data-nu-option="Language">Language</button>
  </div>
  <div class="nu-multi-selected" data-nu-chips aria-live="polite"></div>
</section>
