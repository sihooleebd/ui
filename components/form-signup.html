<form class="nu-form" aria-label="Signup form">
  <div class="nu-form-grid">
    <div class="nu-field">
      <label class="nu-label" for="signup-first">First name</label>
      <input class="nu-input" id="signup-first" type="text" placeholder="Min">
    </div>
    <div class="nu-field">
      <label class="nu-label" for="signup-last">Last name</label>
      <input class="nu-input" id="signup-last" type="text" placeholder="Kim">
    </div>
  </div>
  <div class="nu-field">
    <label class="nu-label" for="signup-role">Role</label>
    <select class="nu-select" id="signup-role">
      <option>Student</option>
      <option>Teacher</option>
      <option>Admin</option>
    </select>
  </div>
  <div class="nu-field">
    <label class="nu-label" for="signup-note">Message</label>
    <textarea class="nu-textarea" id="signup-note" placeholder="Tell us what you need..."></textarea>
  </div>
  <div class="nu-form-actions">
    <button class="nu-btn" type="button">Back</button>
    <button class="nu-btn nu-btn-solid" type="submit">Create account</button>
  </div>
</form>
