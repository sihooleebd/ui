<div class="nu-overlay-demo" data-nu-drawer>
  <button class="nu-btn nu-btn-solid" type="button" data-nu-open>Open Drawer</button>
  <div class="nu-overlay-backdrop" data-nu-overlay></div>
  <aside class="nu-drawer" data-nu-panel role="dialog" aria-label="Drawer panel" aria-modal="true">
    <header class="nu-drawer-head">
      <h3 class="nu-card-title">Filters</h3>
      <button class="nu-btn nu-btn-sm" type="button" data-nu-close>Close</button>
    </header>
    <div class="nu-stack">
      <label class="nu-check"><input class="nu-check-input" type="checkbox" checked><span class="nu-check-box"></span><span class="nu-check-label">Only open</span></label>
      <label class="nu-check"><input class="nu-check-input" type="checkbox"><span class="nu-check-box"></span><span class="nu-check-label">Include labs</span></label>
    </div>
  </aside>
</div>
