<section class="nu-date-range-picker" data-nu-date-range-picker data-nu-date-range>
  <header class="nu-surface-head">
    <h3 class="nu-card-title">Date Range</h3>
    <span class="nu-help" data-nu-output>No range</span>
  </header>
  <div class="nu-date-range-grid" role="grid" aria-label="Select date range">
    <button class="nu-calendar-cell" type="button" data-nu-day="1">1</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="2">2</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="3">3</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="4">4</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="5">5</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="6">6</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="7">7</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="8">8</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="9">9</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="10">10</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="11">11</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="12">12</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="13">13</button>
    <button class="nu-calendar-cell" type="button" data-nu-day="14">14</button>
  </div>
</section>
