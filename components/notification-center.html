<div class="nu-overlay-demo" data-nu-notification-center>
  <button class="nu-btn nu-btn-solid" type="button" data-nu-open>Open Notifications</button>
  <div class="nu-overlay-backdrop" data-nu-overlay></div>
  <aside class="nu-notification-center" data-nu-panel role="dialog" aria-label="Notification center" aria-modal="true">
    <header class="nu-drawer-head">
      <h3 class="nu-card-title">Notifications</h3>
      <button class="nu-btn nu-btn-sm" type="button" data-nu-close>Close</button>
    </header>
    <ul class="nu-log-list">
      <li><span class="nu-log-time">Now</span><span>4 classes need approval</span></li>
      <li><span class="nu-log-time">5m</span><span>API latency recovered</span></li>
      <li><span class="nu-log-time">18m</span><span>New release available</span></li>
    </ul>
  </aside>
</div>
