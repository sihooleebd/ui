<div class="nu-popover" data-nu-popover data-nu-popover-component>
  <button class="nu-btn nu-btn-solid" type="button" data-nu-trigger aria-haspopup="dialog">Open Popover</button>
  <section class="nu-popover-panel" data-nu-panel role="dialog" aria-label="Popover panel">
    <header class="nu-surface-head">
      <h3 class="nu-card-title">Quick Filters</h3>
      <button class="nu-btn nu-btn-sm" type="button" data-nu-close>Close</button>
    </header>
    <div class="nu-stack">
      <label class="nu-check"><input class="nu-check-input" type="checkbox" checked><span class="nu-check-box"></span><span class="nu-check-label">Only open slots</span></label>
      <label class="nu-check"><input class="nu-check-input" type="checkbox"><span class="nu-check-box"></span><span class="nu-check-label">Include archived</span></label>
    </div>
  </section>
</div>
