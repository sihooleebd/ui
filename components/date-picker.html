<div class="nu-calendar" role="dialog" aria-label="Date picker">
  <div class="nu-calendar-head">
    <button class="nu-btn nu-btn-sm" type="button">Prev</button>
    <span class="nu-calendar-title">March 2026</span>
    <button class="nu-btn nu-btn-sm" type="button">Next</button>
  </div>
  <div class="nu-calendar-grid">
    <span class="nu-calendar-weekday">Sun</span>
    <span class="nu-calendar-weekday">Mon</span>
    <span class="nu-calendar-weekday">Tue</span>
    <span class="nu-calendar-weekday">Wed</span>
    <span class="nu-calendar-weekday">Thu</span>
    <span class="nu-calendar-weekday">Fri</span>
    <span class="nu-calendar-weekday">Sat</span>

    <button class="nu-calendar-cell is-muted" type="button">23</button>
    <button class="nu-calendar-cell is-muted" type="button">24</button>
    <button class="nu-calendar-cell is-muted" type="button">25</button>
    <button class="nu-calendar-cell is-muted" type="button">26</button>
    <button class="nu-calendar-cell is-muted" type="button">27</button>
    <button class="nu-calendar-cell is-muted" type="button">28</button>
    <button class="nu-calendar-cell" type="button">1</button>

    <button class="nu-calendar-cell" type="button">2</button>
    <button class="nu-calendar-cell" type="button">3</button>
    <button class="nu-calendar-cell" type="button">4</button>
    <button class="nu-calendar-cell" type="button">5</button>
    <button class="nu-calendar-cell" type="button">6</button>
    <button class="nu-calendar-cell" type="button">7</button>
    <button class="nu-calendar-cell is-active" type="button">8</button>
  </div>
</div>
